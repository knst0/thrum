name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, next, alpha)"
        required: false
        default: latest

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Determine dist-tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
            case "$VERSION" in
              *-alpha*) TAG="alpha" ;;
              *-beta*)  TAG="beta"  ;;
              *-rc*)    TAG="rc"    ;;
              *-next*)  TAG="next"  ;;
              *)        TAG="latest" ;;
            esac
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish packages
        run: |
          for pkg in packages/core packages/solid-adapter; do
            (cd "$pkg" && bun publish --tag ${{ steps.tag.outputs.value }} --access public)
          done
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
